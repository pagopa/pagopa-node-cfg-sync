version: '3.9'
services:
  postgres:
    image: postgres:14@sha256:78e24d2a0b1abbfd5ece76369e1d16fde22a36d6f7c668650b58afe1f106de5c
    container_name: postgres_nexi
    ports:
      - 5432:5432
    volumes:
      - ./postgres-data:/var/lib/postgresql/data
      - ./postgres:/docker-entrypoint-initdb.d
    environment:
      - POSTGRES_DB=nodo
      - POSTGRES_USER=cfg
      - POSTGRES_PASSWORD=password